version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports
      - db:/app/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/reengrave.db
      UPLOAD_DIR: /app/uploads
      EXPORT_DIR: /app/exports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uploads:
  exports:
  db:
